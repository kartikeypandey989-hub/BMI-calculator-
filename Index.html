<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Day Calculator</title>

<style>
    body{
        margin:0;
        padding:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#00c6ff,#0072ff,#ff00cc);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        background:white;
        width:90%;
        max-width:500px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
        text-align:center;
    }

    h1{
        color:#0072ff;
        margin-bottom:20px;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        border:2px solid #0072ff;
        border-radius:10px;
        font-size:16px;
    }

    button{
        background:linear-gradient(45deg,#ff0080,#0072ff);
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        margin-top:10px;
    }

    button:hover{
        transform:scale(1.05);
        transition:0.3s;
    }

    .result{
        margin-top:25px;
        background:#f3f3f3;
        padding:20px;
        border-radius:15px;
        text-align:left;
    }

    .result p{
        font-size:18px;
        margin:10px 0;
        color:#333;
    }

    .footer{
        margin-top:25px;
        font-size:18px;
        font-weight:bold;
        color:#ff0080;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Day Calculator</h1>

    <input type="date" id="startDate">
    <input type="date" id="endDate">

    <br>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result" style="display:none;">
        <p id="days"></p>
        <p id="weeks"></p>
        <p id="hours"></p>
        <p id="minutes"></p>
        <p id="seconds"></p>
    </div>

    <div class="footer">
        Designed and Developed by Kartikey Pandey
    </div>

</div>

<script>

function calculate(){

    let start = new Date(document.getElementById("startDate").value);
    let end = new Date(document.getElementById("endDate").value);

    let diff = Math.abs(end - start);

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let weeks = (days / 7).toFixed(2);
    let hours = Math.floor(diff / (1000 * 60 * 60));
    let minutes = Math.floor(diff / (1000 * 60));
    let seconds = Math.floor(diff / 1000);

    document.getElementById("result").style.display = "block";

    document.getElementById("days").innerHTML =
        "📅 Total Days: <b>" + days + "</b>";

    document.getElementById("weeks").innerHTML =
        "📆 Total Weeks: <b>" + weeks + "</b>";

    document.getElementById("hours").innerHTML =
        "⏰ Total Hours: <b>" + hours + "</b>";

    document.getElementById("minutes").innerHTML =
        "⌛ Total Minutes: <b>" + minutes + "</b>";

    document.getElementById("seconds").innerHTML =
        "⚡ Total Seconds: <b>" + seconds + "</b>";
}

</script>

</body>
</html>
